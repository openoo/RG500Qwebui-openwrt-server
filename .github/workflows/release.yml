name: Build OpenWrt Packages

on:
  workflow_dispatch:
    inputs:
      publish_release:
        description: Publish GitHub Release
        required: true
        type: boolean
        default: true
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.package }} for OpenWrt ${{ matrix.openwrt }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - openwrt: "24.10.6"
            package: rg500q-webserver
            package_dir: rg500q-webserver
            extension: ipk
          - openwrt: "24.10.6"
            package: luci-app-rg500q-webui
            package_dir: luci-app-rg500q-webui
            extension: ipk
          - openwrt: "25.12.3"
            package: rg500q-webserver
            package_dir: rg500q-webserver
            extension: apk
          - openwrt: "25.12.3"
            package: luci-app-rg500q-webui
            package_dir: luci-app-rg500q-webui
            extension: apk

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cross build Rust backend
        if: matrix.package == 'rg500q-webserver'
        shell: bash
        run: |
          set -euxo pipefail
          docker run --rm \
            -v "$PWD/rg500q-webserver":/home/rust/src \
            messense/rust-musl-cross:aarch64-musl \
            cargo build --release --locked
          mkdir -p rg500q-webserver/files/usr/bin
          cp rg500q-webserver/target/aarch64-unknown-linux-musl/release/rg500q-webserver \
            rg500q-webserver/files/usr/bin/rg500q-webserver
          chmod +x rg500q-webserver/files/usr/bin/rg500q-webserver

      - name: Build package
        uses: nooblk-98/openwrt-package-compile-action@main
        with:
          sdk-version: ${{ matrix.openwrt }}
          sdk-target: qualcommax
          sdk-subtarget: ipq807x
          package-name: ${{ matrix.package }}
          package-dir: ${{ matrix.package_dir }}
          feeds-update: packages luci
          feeds-install-all-from: luci
          artifact-name: ${{ matrix.package }}-openwrt-${{ matrix.openwrt }}-qualcommax-ipq807x
          retention-days: 7

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event.inputs.publish_release == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Create source package and checksums
        shell: bash
        run: |
          set -euxo pipefail
          tar --exclude='.git' --exclude='release-artifacts' \
            -czf "release-artifacts/RG500Qwebui-openwrt-server-openwrt-package.tar.gz" \
            rg500q-webserver luci-app-rg500q-webui README.md .github
          (cd release-artifacts && sha256sum * > SHA256SUMS.txt)

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('build-{0}', github.run_number) }}
          name: RG500Q WebUI OpenWrt Build ${{ github.run_number }}
          files: release-artifacts/*
          generate_release_notes: true
