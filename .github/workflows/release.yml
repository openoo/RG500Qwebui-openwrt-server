name: Build OpenWrt Packages

on:
  workflow_dispatch:
    inputs:
      publish_release:
        description: Publish GitHub Release
        required: true
        type: boolean
        default: true
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build OpenWrt ${{ matrix.series }} ${{ matrix.format }} packages
    runs-on: ubuntu-22.04

    strategy:
      fail-fast: false
      matrix:
        include:
          - series: "24.10"
            format: ipk
          - series: "25.12"
            format: apk

    env:
      OPENWRT_TARGET: qualcommax
      OPENWRT_SUBTARGET: ipq807x

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk gcc-multilib gettext git \
            libncurses-dev libssl-dev python3-distutils rsync unzip wget zlib1g-dev \
            file zstd

      - name: Download OpenWrt SDK
        shell: bash
        run: |
          set -euxo pipefail
          SERIES="${{ matrix.series }}"
          RELEASE_VERSION="$(wget -qO- https://downloads.openwrt.org/releases/ \
            | grep -oE "href=\"${SERIES}\\.[0-9]+/\"" \
            | sed -E 's#href="([^/]+)/"#\1#' \
            | sort -V \
            | tail -n1)"
          test -n "${RELEASE_VERSION}"
          BASE_URL="https://downloads.openwrt.org/releases/${RELEASE_VERSION}/targets/${OPENWRT_TARGET}/${OPENWRT_SUBTARGET}"
          SDK_LABEL="openwrt-${RELEASE_VERSION}-${OPENWRT_TARGET}-${OPENWRT_SUBTARGET}"
          SDK_FILE="$(wget -qO- "${BASE_URL}/" | grep -oE 'openwrt-sdk-[^"]+Linux-x86_64\.tar\.zst' | head -n1)"
          test -n "${SDK_FILE}"
          wget -O openwrt-sdk.tar.zst "${BASE_URL}/${SDK_FILE}"
          tar --use-compress-program=unzstd -xf openwrt-sdk.tar.zst
          mv openwrt-sdk-* openwrt-sdk
          echo "SDK_LABEL=${SDK_LABEL}" >> "$GITHUB_ENV"
          echo "RELEASE_VERSION=${RELEASE_VERSION}" >> "$GITHUB_ENV"

      - name: Copy packages into SDK
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p openwrt-sdk/package/RG500Qwebui-openwrt-server
          rsync -a --delete \
            --exclude='.git' \
            --exclude='.github' \
            ./ openwrt-sdk/package/RG500Qwebui-openwrt-server/

      - name: Update feeds
        working-directory: openwrt-sdk
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Configure SDK
        working-directory: openwrt-sdk
        run: |
          make defconfig

      - name: Build backend
        working-directory: openwrt-sdk
        run: |
          make package/RG500Qwebui-openwrt-server/rg500q-webserver/compile V=s

      - name: Build LuCI
        working-directory: openwrt-sdk
        run: |
          make package/RG500Qwebui-openwrt-server/luci-app-rg500q-webui/compile V=s

      - name: Collect ${{ matrix.format }} artifacts
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p "artifacts-${{ matrix.format }}"
          if [ "${{ matrix.format }}" = "ipk" ]; then
            find openwrt-sdk/bin -type f \( \
              -name 'rg500q-webserver_*.ipk' -o \
              -name 'luci-app-rg500q-webui_*.ipk' \
            \) -exec cp -v {} "artifacts-${{ matrix.format }}/" \;
          else
            find openwrt-sdk/bin -type f \( \
              -name 'rg500q-webserver-*.apk' -o \
              -name 'luci-app-rg500q-webui-*.apk' \
            \) -exec cp -v {} "artifacts-${{ matrix.format }}/" \;
          fi
          test "$(find "artifacts-${{ matrix.format }}" -type f | wc -l)" -gt 0

      - name: Upload ${{ matrix.format }} artifacts
        uses: actions/upload-artifact@v4
        with:
          name: RG500Qwebui-openwrt-server-openwrt-${{ matrix.series }}-${{ matrix.format }}-${{ env.OPENWRT_TARGET }}-${{ env.OPENWRT_SUBTARGET }}
          path: artifacts-${{ matrix.format }}/*

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-22.04
    if: startsWith(github.ref, 'refs/tags/') || github.event.inputs.publish_release == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Create source package and checksums
        shell: bash
        run: |
          set -euxo pipefail
          tar --exclude='.git' --exclude='release-artifacts' \
            -czf "release-artifacts/RG500Qwebui-openwrt-server-openwrt-package.tar.gz" \
            rg500q-webserver luci-app-rg500q-webui README.md .github
          (cd release-artifacts && sha256sum * > SHA256SUMS.txt)

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('build-{0}', github.run_number) }}
          name: RG500Q WebUI OpenWrt Build ${{ github.run_number }}
          files: release-artifacts/*
          generate_release_notes: true
