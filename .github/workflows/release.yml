name: Build OpenWrt IPK

on:
  workflow_dispatch:
    inputs:
      openwrt_version:
        description: OpenWrt release version
        required: true
        default: 24.10.2
      target:
        description: OpenWrt target
        required: true
        default: mediatek
      subtarget:
        description: OpenWrt subtarget
        required: true
        default: filogic
      publish_release:
        description: Publish GitHub Release
        required: true
        type: boolean
        default: true
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build IPK
    runs-on: ubuntu-22.04

    env:
      OPENWRT_VERSION: ${{ github.event.inputs.openwrt_version || '24.10.2' }}
      OPENWRT_TARGET: ${{ github.event.inputs.target || 'mediatek' }}
      OPENWRT_SUBTARGET: ${{ github.event.inputs.subtarget || 'filogic' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk gcc-multilib gettext git \
            libncurses-dev libssl-dev python3-distutils rsync unzip wget zlib1g-dev \
            file zstd

      - name: Download OpenWrt SDK
        shell: bash
        run: |
          set -euxo pipefail
          BASE_URL="https://downloads.openwrt.org/releases/${OPENWRT_VERSION}/targets/${OPENWRT_TARGET}/${OPENWRT_SUBTARGET}"
          SDK_FILE="$(wget -qO- "${BASE_URL}/" | grep -oE 'openwrt-sdk-[^"]+Linux-x86_64\.tar\.zst' | head -n1)"
          test -n "${SDK_FILE}"
          wget -O openwrt-sdk.tar.zst "${BASE_URL}/${SDK_FILE}"
          tar --use-compress-program=unzstd -xf openwrt-sdk.tar.zst
          mv openwrt-sdk-* openwrt-sdk
          echo "SDK_FILE=${SDK_FILE}" >> "$GITHUB_ENV"

      - name: Copy packages into SDK
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p openwrt-sdk/package/RG500Qwebui-openwrt-server
          rsync -a --delete \
            --exclude='.git' \
            --exclude='.github' \
            ./ openwrt-sdk/package/RG500Qwebui-openwrt-server/

      - name: Update feeds
        working-directory: openwrt-sdk
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Configure SDK
        working-directory: openwrt-sdk
        run: |
          make defconfig

      - name: Build rg500q-webserver
        working-directory: openwrt-sdk
        run: |
          make package/RG500Qwebui-openwrt-server/rg500q-webserver/compile V=s

      - name: Build luci-app-rg500q-webui
        working-directory: openwrt-sdk
        run: |
          make package/RG500Qwebui-openwrt-server/luci-app-rg500q-webui/compile V=s

      - name: Collect artifacts
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p artifacts
          find openwrt-sdk/bin -type f \( \
            -name 'rg500q-webserver_*.ipk' -o \
            -name 'luci-app-rg500q-webui_*.ipk' \
          \) -exec cp -v {} artifacts/ \;
          tar --exclude='.git' --exclude='openwrt-sdk' --exclude='artifacts' \
            -czf "artifacts/RG500Qwebui-openwrt-server-openwrt-package.tar.gz" \
            rg500q-webserver luci-app-rg500q-webui README.md .github
          (cd artifacts && sha256sum * > SHA256SUMS.txt)

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: RG500Qwebui-openwrt-server-${{ env.OPENWRT_VERSION }}-${{ env.OPENWRT_TARGET }}-${{ env.OPENWRT_SUBTARGET }}
          path: artifacts/*

      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/') || github.event.inputs.publish_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('build-{0}', github.run_number) }}
          name: RG500Q WebUI OpenWrt Build ${{ github.run_number }}
          files: artifacts/*
          generate_release_notes: true
